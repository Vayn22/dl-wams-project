# ============================================================
#  PC3 / PC4 / Extra machines – Template for additional services
#
#  Copy this file and rename it (e.g. docker-compose.pc3.yml).
#  Add whatever new services you want to run on that machine.
#  The consul-client block handles cluster membership automatically.
#
#  Before starting, set:
#    Windows PowerShell:
#      $env:PC1_IP="192.168.1.10"   # LAN IP of PC1 (Consul server)
#      $env:THIS_IP="192.168.1.30"  # LAN IP of THIS machine
#
#    Linux/macOS:
#      export PC1_IP=192.168.1.10
#      export THIS_IP=192.168.1.30
# ============================================================

services:
  consul-client:
    image: hashicorp/consul:1.21.3
    command:
      - "agent"
      - "-client=0.0.0.0"
      - "-ui"
      - "-advertise=${THIS_IP:-127.0.0.1}"
      - "-bind=0.0.0.0"
      - "-retry-join=${PC1_IP:-127.0.0.1}"
    ports:
      - "8500:8500"
      - "8301:8301"
      - "8301:8301/udp"
    networks:
      - wams_net

  # -------------------------------------------------------
  # Add your services below.
  # Replace MY_SERVICE, MY_SERVICE_PORT, MY_DB, etc.
  # -------------------------------------------------------

