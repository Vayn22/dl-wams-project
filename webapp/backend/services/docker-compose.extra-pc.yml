  #     timeout: 5s
  #     retries: 10
  #   networks:
  #     - wams_net

  # my_service:
  #   build: ./my_service
  #   environment:
  #     CONSUL_URL: http://consul-client:8500
  #     SERVICE_NAME: my-service
  #     SERVICE_ID: my-service-1
  #     SERVICE_HOST: ${THIS_IP:-127.0.0.1}
  #     SERVICE_PORT: 8003
  #     HEALTH_URL: http://${THIS_IP:-127.0.0.1}:8003/api/health/
  #     POSTGRES_DB: my_db
  #     POSTGRES_USER: my_user
  #     POSTGRES_PASSWORD: my_password
  #     POSTGRES_HOST: my_service_db
